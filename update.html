<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Dispatch System - Automation Ready</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --admin-dark: #0f172a; --admin-accent: #3b82f6; --app-bg: #f1f5f9;
            --success: #22c55e; --danger: #ef4444; --warning: #f59e0b;
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { margin: 0; display: flex; height: 100vh; background: #cbd5e1; overflow: hidden; }

        /* --- ADMIN PANEL --- */
        #admin-panel { flex: 3; display: flex; background: #fff; height: 100vh; }
        .sidebar { width: 260px; background: var(--admin-dark); color: white; padding: 20px; display: flex; flex-direction: column; }
        .nav-item { padding: 12px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; transition: 0.3s; }
        .nav-item.active { background: var(--admin-accent); }
        .admin-main { flex: 1; padding: 25px; overflow-y: auto; background: #f8fafc; }
        .card { background: white; border: 1px solid #e2e8f0; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        input, select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; width: 100%; margin-bottom: 10px; }

        /* --- MOBILE APP FRAME --- */
        #mobile-simulator { flex: 1.5; display: flex; justify-content: center; align-items: center; border-left: 2px solid #94a3b8; }
        .phone { width: 350px; height: 720px; background: #000; border-radius: 50px; padding: 12px; position: relative; box-shadow: 0 50px 100px rgba(0,0,0,0.4); }
        .screen { width: 100%; height: 100%; background: var(--app-bg); border-radius: 38px; overflow: hidden; position: relative; display: flex; flex-direction: column; }
        
        .app-header { background: white; padding: 45px 20px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; }
        .side-menu { position: absolute; top: 0; left: -100%; width: 80%; height: 100%; background: white; z-index: 1000; transition: 0.3s; padding: 60px 20px; }
        .side-menu.open { left: 0; }
        .menu-link { padding: 15px; border-bottom: 1px solid #f1f5f9; cursor: pointer; font-weight: 500; }
        
        /* --- CHAT SYSTEM --- */
        .chat-container { height: 400px; display: flex; flex-direction: column; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px 12px; border-radius: 12px; max-width: 75%; font-size: 13px; word-wrap: break-word; }
        .msg.sent { align-self: flex-end; background: var(--admin-accent); color: white; }
        .msg.received { align-self: flex-start; background: #e2e8f0; color: #1e293b; }

        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; }
        .btn-primary { background: var(--admin-accent); color: white; }
        .hidden { display: none !important; }
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="admin-panel">
    <div class="sidebar">
        <h2>DISPATCH ADMIN</h2>
        <div class="nav-item active" onclick="switchAdminTab('orders')">📦 Create Trip</div>
        <div class="nav-item" onclick="switchAdminTab('drivers')">👥 Drivers Module</div>
        <div class="nav-item" onclick="switchAdminTab('chat')">💬 Driver Chats <span id="admin-notif" style="color:red; display:none;">●</span></div>
    </div>

    <div class="admin-main">
        <div id="tab-orders" class="admin-tab">
            <h3>Order & Trip Management</h3>
            <div class="card" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <input type="text" id="trip-id-input" placeholder="Trip/Order ID">
                <select id="driver-select-admin"></select>
                <select id="loc-select">
                    <option>New York Warehouse</option>
                    <option>Los Angeles Port</option>
                    <option>Texas Distribution</option>
                </select>
                <input type="number" id="charge-input" placeholder="Driver Charge ($)">
                <input type="file" id="admin-attachment">
                <button class="btn btn-primary" style="grid-column: span 2;" onclick="assignTrip()">Assign Trip & Notify Driver</button>
            </div>
            <table>
                <thead><tr><th>Trip ID</th><th>Driver</th><th>Status</th><th>Action</th></tr></thead>
                <tbody id="admin-trip-table"></tbody>
            </table>
        </div>

        <div id="tab-drivers" class="admin-tab hidden">
            <h3>Driver Module</h3>
            <div class="card">
                <input type="text" id="new-driver-name" placeholder="Driver Full Name">
                <input type="text" id="new-driver-user" placeholder="Login Username">
                <input type="password" id="new-driver-pass" placeholder="Initial Password">
                <button class="btn btn-primary" onclick="registerDriver()">Create Driver Account</button>
            </div>
        </div>

        <div id="tab-chat" class="admin-tab hidden">
            <h3>Active Conversations</h3>
            <div style="display:flex; gap:20px;">
                <div id="driver-chat-list" style="width:200px; background:white; border-radius:8px; padding:10px;"></div>
                <div class="card" style="flex:1;">
                    <h4 id="chat-with-label">Select a driver to chat</h4>
                    <div id="admin-chat-box" class="chat-messages" style="height:300px; border:1px solid #eee; margin-bottom:10px;"></div>
                    <div style="display:flex; gap:5px;">
                        <input type="text" id="admin-msg-input" placeholder="Type message/link...">
                        <button onclick="sendMsg('admin')" style="width:80px; height:40px;">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="mobile-simulator">
    <div class="phone">
        <div class="screen">
            <div id="app-side-menu" class="side-menu">
                <div class="menu-link" onclick="showAppPage('app-dash')">Dashboard</div>
                <div class="menu-link" onclick="showAppPage('app-punch')">Punch Clock</div>
                <div class="menu-link" onclick="showAppPage('app-chat')">Chat</div>
                <div class="menu-link" onclick="showAppPage('app-profile')">Profile</div>
                <div class="menu-link" style="color:var(--danger)" onclick="appLogout()">Logout</div>
            </div>

            <div id="app-login-screen" style="padding: 60px 20px;">
                <h2 style="text-align:center">Driver App</h2>
                <input type="text" id="app-user" placeholder="Username">
                <input type="password" id="app-pass" placeholder="Password">
                <button class="btn btn-primary" onclick="appLogin()">Login</button>
            </div>

            <div id="app-main-interface" class="hidden">
                <div class="app-header">
                    <div onclick="toggleAppMenu()" style="cursor:pointer">☰</div>
                    <div id="app-header-title">Dashboard</div>
                    <div id="app-notif-bell" style="color:var(--danger); display:none">🔔</div>
                </div>

                <div id="app-body" style="padding:15px; flex:1; overflow-y:auto;">
                    <div id="app-dash" class="app-page">
                        <div id="my-trips-container"></div>
                    </div>

                    <div id="app-punch" class="app-page hidden">
                        <h4>Work Session</h4>
                        <select id="truck-dropdown">
                            <option>Semi Truck - T01</option>
                            <option>Flatbed - F09</option>
                            <option>Box Truck - B04</option>
                        </select>
                        <button id="punch-btn" class="btn btn-primary" onclick="handlePunch()">Punch In</button>
                        <hr>
                        <button class="btn" onclick="showPunchReport()" style="background:#e2e8f0">View Punch Report</button>
                        <div id="punch-report-area" class="hidden" style="font-size:12px; margin-top:10px;"></div>
                    </div>

                    <div id="app-chat" class="app-page hidden">
                        <div id="app-chat-box" class="chat-messages" style="height:450px;"></div>
                        <div style="display:flex; gap:5px;">
                            <input type="text" id="app-msg-input" placeholder="Message Admin...">
                            <button onclick="sendMsg('app')" style="height:38px;">Send</button>
                        </div>
                    </div>

                    <div id="app-profile" class="app-page hidden">
                        <h4>Account Settings</h4>
                        <div class="card">
                            <label>Change Password</label>
                            <input type="password" id="profile-new-pass" placeholder="New Password">
                            <button class="btn btn-primary" onclick="updatePassword()">Update Password</button>
                        </div>
                    </div>

                    <div id="app-trip-detail" class="app-page hidden">
                        <button onclick="showAppPage('app-dash')" style="margin-bottom:10px;">< Back</button>
                        <div class="card">
                            <h3 id="det-id"></h3>
                            <p id="det-loc"></p>
                            <p id="det-status"></p>
                            <div id="trip-flow-btns"></div>
                        </div>
                        <div id="pod-area" class="card hidden">
                            <h4>Proof of Delivery</h4>
                            <input type="text" id="pod-cust-name" placeholder="Customer Signature Name">
                            <canvas id="pod-canvas" style="border:1px dashed #000; width:100%; height:80px; background:#fff"></canvas>
                            <button class="btn btn-primary" style="margin-top:10px;" onclick="generatePOD()">Create PDF & Finish</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- DATABASE (Persistence) ---
    let db = JSON.parse(localStorage.getItem('dispatch_final_v1')) || {
        drivers: [{name: 'John Doe', user: 'john', pass: '123'}],
        trips: [],
        punches: [],
        chats: {} // Format: { "username": [{source, text, time}] }
    };

    function save() {
        localStorage.setItem('dispatch_final_v1', JSON.stringify(db));
        renderAdmin();
        renderApp();
    }

    // --- ADMIN LOGIC ---
    function registerDriver() {
        const name = document.getElementById('new-driver-name').value;
        const user = document.getElementById('new-driver-user').value;
        const pass = document.getElementById('new-driver-pass').value;
        if(name && user) {
            db.drivers.push({name, user, pass});
            db.chats[user] = []; // Initialize empty chat for this driver
            save();
            alert("Driver Created!");
        }
    }

    function assignTrip() {
        const id = document.getElementById('trip-id-input').value;
        const driver = document.getElementById('driver-select-admin').value;
        const loc = document.getElementById('loc-select').value;
        if(!id || !driver) return alert("Fill all fields");

        db.trips.push({
            id, driver, loc, status: 'Pending', 
            start: null, end: null, charge: document.getElementById('charge-input').value
        });
        save();
        document.getElementById('app-notif-bell').style.display = 'block';
    }

    function renderAdmin() {
        // Driver Dropdowns
        const sel = document.getElementById('driver-select-admin');
        sel.innerHTML = db.drivers.map(d => `<option value="${d.user}">${d.name}</option>`).join('');

        // Trip Table
        document.getElementById('admin-trip-table').innerHTML = db.trips.map(t => `
            <tr>
                <td>#${t.id}</td><td>${t.driver}</td>
                <td><span class="badge" style="background:${t.status=='Completed'?'#dcfce7':'#ffedd5'}">${t.status}</span></td>
                <td><button onclick="deleteTrip('${t.id}')">Delete</button></td>
            </tr>
        `).join('');

        // Chat List
        document.getElementById('driver-chat-list').innerHTML = db.drivers.map(d => `
            <div onclick="selectChat('${d.user}')" style="padding:10px; cursor:pointer; border-bottom:1px solid #eee;">
                ${d.name} ${db.chats[d.user]?.length > 0 ? '💬' : ''}
            </div>
        `).join('');
    }

    // --- APP LOGIC ---
    let currentUser = null;
    let activeChatTarget = null;

    function appLogin() {
        const u = document.getElementById('app-user').value;
        const p = document.getElementById('app-pass').value;
        const userFound = db.drivers.find(d => d.user === u && d.pass === p);
        if(userFound) {
            currentUser = userFound;
            document.getElementById('app-login-screen').classList.add('hidden');
            document.getElementById('app-main-interface').classList.remove('hidden');
            document.getElementById('app-notif-bell').style.display = 'none';
            save();
        } else { alert("Invalid credentials"); }
    }

    function renderApp() {
        if(!currentUser) return;
        
        // Filter trips for CURRENT driver only
        const myTrips = db.trips.filter(t => t.driver === currentUser.user);
        const container = document.getElementById('my-trips-container');
        
        if(myTrips.length === 0) container.innerHTML = "No trips assigned.";
        else {
            container.innerHTML = myTrips.map(t => `
                <div class="card" onclick="openTripDetail('${t.id}')">
                    <strong>#${t.id}</strong> - ${t.status}<br>
                    <small>${t.loc}</small>
                </div>
            `).join('');
        }

        // Render Chat
        const chatBoxApp = document.getElementById('app-chat-box');
        const msgs = db.chats[currentUser.user] || [];
        chatBoxApp.innerHTML = msgs.map(m => `<div class="msg ${m.source=='app'?'sent':'received'}">${m.text}</div>`).join('');
    }

    function openTripDetail(id) {
        const t = db.trips.find(x => x.id === id);
        showAppPage('app-trip-detail');
        document.getElementById('det-id').innerText = "Trip #" + t.id;
        document.getElementById('det-loc').innerText = "Location: " + t.loc;
        document.getElementById('det-status').innerText = "Status: " + t.status;
        
        let btns = "";
        if(t.status === 'Pending') btns = `<button class="btn btn-primary" onclick="updateTrip('${t.id}', 'Acknowledged')">Acknowledge</button>`;
        else if(t.status === 'Acknowledged') btns = `<button class="btn btn-primary" onclick="updateTrip('${t.id}', 'Started')">Start Trip</button>`;
        else if(t.status === 'Started') btns = `<button class="btn btn-primary" style="background:var(--success)" onclick="showPODArea('${t.id}')">Complete & POD</button>`;
        
        document.getElementById('trip-flow-btns').innerHTML = btns;
    }

    function updateTrip(id, status) {
        const t = db.trips.find(x => x.id === id);
        t.status = status;
        if(status === 'Started') t.start = new Date().toLocaleString();
        save();
        openTripDetail(id);
    }

    function showPODArea() { document.getElementById('pod-area').classList.remove('hidden'); }

    function generatePOD() {
        const id = document.getElementById('det-id').innerText.split('#')[1];
        const t = db.trips.find(x => x.id === id);
        t.status = "Completed";
        t.end = new Date().toLocaleString();
        save();

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("DELIVERY RECEIPT", 10, 10);
        doc.text(`Order: ${t.id}`, 10, 20);
        doc.text(`Driver: ${currentUser.name}`, 10, 30);
        doc.text(`Start: ${t.start}`, 10, 40);
        doc.text(`End: ${t.end}`, 10, 50);
        doc.text(`Customer: ${document.getElementById('pod-cust-name').value}`, 10, 60);
        doc.save(`POD_${t.id}.pdf`);
        showAppPage('app-dash');
    }

    // --- PUNCH SYSTEM ---
    let isPunchedIn = false;
    function handlePunch() {
        const btn = document.getElementById('punch-btn');
        const now = new Date();
        const truck = document.getElementById('truck-dropdown').value;
        
        db.punches.push({
            user: currentUser.user,
            time: now.toLocaleString(),
            raw: now.getTime(),
            type: isPunchedIn ? "OUT" : "IN",
            truck: truck
        });

        isPunchedIn = !isPunchedIn;
        btn.innerText = isPunchedIn ? "Punch Out" : "Punch In";
        btn.style.background = isPunchedIn ? "var(--danger)" : "var(--admin-accent)";
        save();
    }

    function showPunchReport() {
        const area = document.getElementById('punch-report-area');
        area.classList.toggle('hidden');
        const myLogs = db.punches.filter(p => p.user === currentUser.user);
        
        let totalMs = 0;
        for(let i=0; i<myLogs.length; i+=2) {
            if(myLogs[i+1]) totalMs += (myLogs[i+1].raw - myLogs[i].raw);
        }
        
        area.innerHTML = `
            <strong>Logs:</strong><br>
            ${myLogs.map(l => `${l.type}: ${l.time}`).join('<br>')}
            <br><strong>Total Time: ${(totalMs / 3600000).toFixed(2)} hours</strong>
        `;
    }

    // --- CHAT MULTI-TENANT ---
    function selectChat(driverUser) {
        activeChatTarget = driverUser;
        document.getElementById('chat-with-label').innerText = "Chatting with: " + driverUser;
        const msgs = db.chats[driverUser] || [];
        document.getElementById('admin-chat-box').innerHTML = msgs.map(m => `
            <div class="msg ${m.source=='admin'?'sent':'received'}">${m.text}</div>
        `).join('');
    }

    function sendMsg(source) {
        const inputId = source === 'admin' ? 'admin-msg-input' : 'app-msg-input';
        const msgText = document.getElementById(inputId).value;
        if(!msgText) return;

        const targetUser = source === 'admin' ? activeChatTarget : currentUser.user;
        if(!targetUser) return alert("Select a driver first");

        if(!db.chats[targetUser]) db.chats[targetUser] = [];
        db.chats[targetUser].push({ source, text: msgText });
        
        document.getElementById(inputId).value = "";
        save();
        if(source === 'app') document.getElementById('admin-notif').style.display = 'inline';
        if(source === 'admin') selectChat(activeChatTarget);
    }

    function updatePassword() {
        const newP = document.getElementById('profile-new-pass').value;
        if(newP) {
            currentUser.pass = newP;
            const idx = db.drivers.findIndex(d => d.user === currentUser.user);
            db.drivers[idx].pass = newP;
            save();
            alert("Password Updated!");
        }
    }

    // --- UI HELPERS ---
    function switchAdminTab(t) {
        document.querySelectorAll('.admin-tab').forEach(x => x.classList.add('hidden'));
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById('tab-' + t).classList.remove('hidden');
        event.currentTarget.classList.add('active');
        if(t === 'chat') document.getElementById('admin-notif').style.display = 'none';
    }

    function showAppPage(p) {
        document.querySelectorAll('.app-page').forEach(x => x.classList.add('hidden'));
        document.getElementById(p).classList.remove('hidden');
        document.getElementById('app-side-menu').classList.remove('open');
    }

    function toggleAppMenu() { document.getElementById('app-side-menu').classList.toggle('open'); }
    function appLogout() { location.reload(); }
    function deleteTrip(id) { db.trips = db.trips.filter(t => t.id !== id); save(); }

    renderAdmin();
</script>
</body>
</html>
